<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Trivia</title>
<style>
  :root{
    --bg: #1a1a2e;
    --panel: #393e6e;
    --panel-light: #454b86;
    --accent: #ffd369;
    --text: #eee;
    --correct: #4caf50;
    --wrong: #e15757;
    --muted: #aab;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    padding: 20px;
  }

  .game-container{
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  header h1{
    font-size: 1.4rem;
    margin: 0;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .scoreboard{
    background: var(--bg);
    border-radius: 10px;
    padding: 8px 16px;
    font-weight: 600;
    color: var(--accent);
  }

  .progress{
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .question-card{
    background: var(--bg);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    min-height: 90px;
    display: flex;
    align-items: center;
    font-size: 1.15rem;
    line-height: 1.5;
  }

  .answers{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  @media (max-width: 480px){
    .answers{ grid-template-columns: 1fr; }
  }

  .answer-btn{
    background: var(--panel-light);
    border: 2px solid transparent;
    color: var(--text);
    border-radius: 10px;
    padding: 16px;
    font-size: 1rem;
    cursor: pointer;
    text-align: left;
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }

  .answer-btn:hover:not(:disabled){
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .answer-btn:disabled{ cursor: default; }

  .answer-btn.correct{
    background: var(--correct);
    color: #0e2710;
    border-color: var(--correct);
  }

  .answer-btn.wrong{
    background: var(--wrong);
    color: #330808;
    border-color: var(--wrong);
  }

  .answer-btn.dim{ opacity: 0.45; }

  .controls{
    display: flex;
    justify-content: flex-end;
    margin-top: 22px;
  }

  .next-btn{
    background: var(--accent);
    color: #1a1a2e;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.12s ease;
  }

  .next-btn:disabled{
    opacity: 0.35;
    cursor: not-allowed;
  }

  .next-btn:hover:not(:disabled){ transform: translateY(-2px); }
  .end-screen{
    text-align: center;
  }

  .end-screen h2{
    color: var(--accent);
    font-size: 1.8rem;
    margin-bottom: 6px;
  }

  .end-screen p{
    color: var(--muted);
    margin-bottom: 24px;
  }

  .restart-btn{
    background: var(--panel-light);
    color: var(--text);
    border: 2px solid var(--accent);
    padding: 12px 28px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  .hidden{ display: none !important; }
</style>
</head>
<body>

<main class="game-container" id="game-container">

  <header>
    <h1>🎉 Party Trivia</h1>
    <div class="scoreboard" id="scoreboard">Score: 0</div>
  </header>

  <div id="quiz-view">
    <div class="progress" id="progress">Question 1 of 6</div>

    <div class="question-card" id="question-text">
      Loading question...
    </div>

    <div class="answers" id="answers"></div>

    <div class="controls">
      <button class="next-btn" id="next-btn" disabled>Next Question →</button>
    </div>
  </div>

  <div id="end-view" class="end-screen hidden">
    <h2 id="final-score-headline">Game Over!</h2>
    <p id="final-score-detail">You scored X out of Y.</p>
    <button class="restart-btn" id="restart-btn">Play Again</button>
  </div>

</main>

<script>
  function getQuestions(){
    return [
      {
        question: "What is the capital of Japan?",
        choices: ["Seoul", "Beijing", "Tokyo", "Bangkok"],
        correctIndex: 2
      },
      {
        question: "Which planet is known as the Red Planet?",
        choices: ["Venus", "Mars", "Jupiter", "Saturn"],
        correctIndex: 1
      },
      {
        question: "How many strings does a standard guitar have?",
        choices: ["4", "5", "6", "7"],
        correctIndex: 2
      },
      {
        question: "Which element has the chemical symbol 'O'?",
        choices: ["Gold", "Oxygen", "Osmium", "Oganesson"],
        correctIndex: 1
      },
      {
        question: "Who painted the Mona Lisa?",
        choices: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Claude Monet"],
        correctIndex: 2
      },
      {
        question: "What is the largest ocean on Earth?",
        choices: ["Atlantic", "Indian", "Arctic", "Pacific"],
        correctIndex: 3
      }
    ];
  }

  const state = {
    questions: getQuestions(),
    currentIndex: 0,
    score: 0,
    answered: false
  };

  const elScoreboard   = document.getElementById('scoreboard');
  const elProgress     = document.getElementById('progress');
  const elQuestionText = document.getElementById('question-text');
  const elAnswers      = document.getElementById('answers');
  const elNextBtn      = document.getElementById('next-btn');
  const elQuizView     = document.getElementById('quiz-view');
  const elEndView      = document.getElementById('end-view');
  const elFinalHeadline= document.getElementById('final-score-headline');
  const elFinalDetail  = document.getElementById('final-score-detail');
  const elRestartBtn   = document.getElementById('restart-btn');

  function renderQuestion(){
    const q = state.questions[state.currentIndex];
    state.answered = false;
    elNextBtn.disabled = true;

    elProgress.textContent = `Question ${state.currentIndex + 1} of ${state.questions.length}`;
    elQuestionText.textContent = q.question;

    elAnswers.innerHTML = '';
    q.choices.forEach((choiceText, idx) => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = choiceText;
      btn.addEventListener('click', () => handleAnswerClick(idx, btn));
      elAnswers.appendChild(btn);
    });
  }

  function handleAnswerClick(selectedIndex, btnEl){
    if (state.answered) return; 
    state.answered = true;

    const q = state.questions[state.currentIndex];
    const allButtons = elAnswers.querySelectorAll('.answer-btn');

    allButtons.forEach((btn, idx) => {
      btn.disabled = true;
      if (idx === q.correctIndex){
        btn.classList.add('correct');
      } else if (idx === selectedIndex){
        btn.classList.add('wrong');
      } else {
        btn.classList.add('dim');
      }
    });

    if (selectedIndex === q.correctIndex){
      state.score += 1;
      updateScoreboard();
    }

    elNextBtn.disabled = false;
  }

  function updateScoreboard(){
    elScoreboard.textContent = `Score: ${state.score}`;
  }

  function checkWinCondition(){
    return state.currentIndex >= state.questions.length - 1;
  }

  function nextQuestion(){
    if (checkWinCondition()){
      showEndScreen();
      return;
    }
    state.currentIndex += 1;
    renderQuestion();
  }

  function showEndScreen(){
    elQuizView.classList.add('hidden');
    elEndView.classList.remove('hidden');

    const total = state.questions.length;
    elFinalHeadline.textContent = state.score === total ? "Perfect Score! 🏆" : "Game Over!";
    elFinalDetail.textContent = `You scored ${state.score} out of ${total}.`;
  }

  function restartGame(){
    state.currentIndex = 0;
    state.score = 0;
    state.answered = false;
    updateScoreboard();
    elEndView.classList.add('hidden');
    elQuizView.classList.remove('hidden');
    renderQuestion();
  }

  elNextBtn.addEventListener('click', nextQuestion);
  elRestartBtn.addEventListener('click', restartGame);

  renderQuestion();
</script>
</body>
</html>
