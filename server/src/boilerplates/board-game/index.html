<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Board Game</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .game {
        text-align: center;
      }
      h1 {
        margin-bottom: 8px;
        font-size: 22px;
      }
      .status {
        margin-bottom: 16px;
        font-size: 18px;
        font-weight: 600;
        color: #ffd369;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(8, 56px);
        grid-template-rows: repeat(8, 56px);
        border: 4px solid #393e6e;
        border-radius: 8px;
        overflow: hidden;
      }
      .square {
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .square.light {
        background: #eaeaea;
      }
      .square.dark {
        background: #393e6e;
      }
      .square.selected {
        outline: 3px solid #ffd369;
        outline-offset: -3px;
      }
      .piece {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
        user-select: none;
      }
      .piece.player1 {
        background: #4fd1c5;
        color: #1a1a2e;
      }
      .piece.player2 {
        background: #f56565;
        color: #1a1a2e;
      }
    </style>
  </head>
  <body>
    <div class="game">
      <h1>Board Game</h1>
      <div class="status" id="status-text">Player 1's turn</div>
      <div class="board" id="board"></div>
    </div>

    <script>
      const BOARD_SIZE = 8;

      const state = {
        pieces: createInitialPieces(),
        currentPlayer: "player1",
        selectedId: null,
        winner: null
      };

      const elBoard = document.getElementById("board");
      const elStatusText = document.getElementById("status-text");

      function isValidMove(piece, targetRow, targetCol, pieces) {
        const rowDiff = Math.abs(piece.row - targetRow);
        const colDiff = Math.abs(piece.col - targetCol);
        const isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        const targetOccupied = pieces.some((p) => p.row === targetRow && p.col === targetCol);
        return isAdjacent && !targetOccupied;
      }

      function checkWinCondition(pieces) {
        return null;
      }

      function createInitialPieces() {
        const pieces = [];
        for (let col = 0; col < BOARD_SIZE; col++) {
          pieces.push({
            id: `p1-${col}`,
            owner: "player1",
            type: "P",
            row: 0,
            col,
          });
          pieces.push({
            id: `p2-${col}`,
            owner: "player2",
            type: "P",
            row: BOARD_SIZE - 1,
            col,
          });
        }
        return pieces;
      }

      function handleSquareClick(row, col) {
        if (state.winner) return;

        const pieceHere = state.pieces.find((p) => p.row === row && p.col === col);
        const selectedPiece = state.pieces.find((p) => p.id === state.selectedId) || null;

        if (selectedPiece && isValidMove(selectedPiece, row, col, state.pieces)) {
          selectedPiece.row = row;
          selectedPiece.col = col;
          state.selectedId = null;

          const win = checkWinCondition(state.pieces);
          if (win) {
            state.winner = win;
          } else {
            state.currentPlayer = state.currentPlayer === "player1" ? "player2" : "player1";
          }
          render();
          return;
        }

        if (pieceHere && pieceHere.owner === state.currentPlayer) {
          state.selectedId = pieceHere.id;
        } else {
          state.selectedId = null;
        }
        render();
      }

      function render() {
        if (state.winner) {
          elStatusText.textContent = `${state.winner} wins!`;
        } else {
          elStatusText.textContent = state.currentPlayer === "player1" ? "Player 1's turn" : "Player 2's turn";
        }

        elBoard.innerHTML = "";

        for (let row = 0; row < BOARD_SIZE; row++) {
          for (let col = 0; col < BOARD_SIZE; col++) {
            const piece = state.pieces.find((p) => p.row === row && p.col === col);
            const isSelected = piece && piece.id === state.selectedId;
            const isDark = (row + col) % 2 === 1;

            const square = document.createElement("div");
            square.className = `square ${isDark ? "dark" : "light"} ${isSelected ? "selected" : ""}`;
            square.addEventListener("click", () => handleSquareClick(row, col));

            if (piece) {
              const pieceEl = document.createElement("div");
              pieceEl.className = `piece ${piece.owner}`;
              pieceEl.textContent = piece.type;
              square.appendChild(pieceEl);
            }

            elBoard.appendChild(square);
          }
        }
      }

      render();
    </script>
  </body>
</html>
